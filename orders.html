<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders � STACKLY PHARMA</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: var(--bg-alt); padding-top: 0; }
    .dashboard-layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; margin-top: 0; }
    .dash-sidebar { background: #fff; border-right: 1px solid rgba(0,0,0,0.05); padding: 2rem 1.5rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; z-index: 100; }
    .dash-main { padding: 2.5rem; }
    .user-profile-widget { text-align: center; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .user-avatar-large { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; font-size: 2.5rem; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; box-shadow: var(--clay-shadow); }
    .user-name-display { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.2rem; }
    .user-role-display { font-size: 0.85rem; color: var(--primary); font-weight: 600; background: rgba(108,99,255,0.1); padding: 0.2rem 0.8rem; border-radius: 99px; display: inline-block; }
    
    .dash-nav { display: flex; flex-direction: column; gap: 0.5rem; }
    .dash-nav-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1rem; border-radius: 12px; color: var(--text-secondary); font-weight: 600; text-decoration: none; transition: all 0.3s ease; }
    .dash-nav-item:hover { background: rgba(108,99,255,0.05); color: var(--primary); }
    .dash-nav-item.active { background: var(--primary); color: #fff; box-shadow: var(--clay-shadow); }
    
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .dash-title { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; color: var(--text-main); }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
    .stat-card { background: #fff; border-radius: 20px; padding: 1.5rem; box-shadow: var(--clay-shadow); display: flex; align-items: center; gap: 1rem; }
    .stat-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
    .stat-icon.blue { background: rgba(0,180,216,0.1); color: var(--secondary); }
    .stat-icon.green { background: rgba(16,185,129,0.1); color: var(--tertiary); }
    .stat-icon.purple { background: rgba(108,99,255,0.1); color: var(--primary); }
    .stat-info h4 { font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; margin-bottom: 0.2rem; }
    .stat-info .val { font-size: 1.5rem; font-weight: 800; color: var(--text-main); font-family: var(--font-heading); }

    .dash-section-title { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 800; margin-bottom: 1rem; color: var(--text-main); }
    .recent-activity { background: #fff; border-radius: 20px; padding: 1.5rem; box-shadow: var(--clay-shadow); }
    .activity-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .activity-item:last-child { border-bottom: none; padding-bottom: 0; }
    .activity-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-alt); display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0; }
    .activity-details h4 { font-size: 0.95rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.2rem; }
    .activity-details p { font-size: 0.85rem; color: var(--text-secondary); }
    .activity-time { font-size: 0.75rem; color: var(--text-light); margin-top: 0.2rem; }

    @media (max-width: 900px) {
      .dashboard-layout { grid-template-columns: 1fr; }
      .dash-sidebar { display: none; }
      .dash-main { padding: 1.5rem; }
    }
    .dash-mobile-header { display: none; }
    @media (max-width: 900px) {
      .dash-mobile-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; background: #fff; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 99; box-shadow: var(--clay-shadow); }
      .dash-mobile-logo img { height: 32px; width: auto; }
      .dash-mobile-hamburger { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 0.5rem; display: flex; align-items: center; justify-content: center; }
    }
    @media (max-width: 600px) {
      .dash-main { padding: 1rem; }
      .dash-title { font-size: 1.4rem; }
      .recent-activity { padding: 1rem; }
      .activity-item { gap: 0.6rem; padding: 0.8rem 0; flex-wrap: wrap; }
      .activity-icon { width: 36px; height: 36px; flex-shrink: 0; }
      .activity-details { min-width: 0; flex: 1; }
      .activity-details h4 { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
      .activity-details p { font-size: 0.78rem; }
      .activity-time { font-size: 0.72rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
      .stat-card { padding: 1rem; gap: 0.75rem; }
    }
    @media (max-width: 400px) {
      .activity-details h4 { max-width: 130px; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="page-loader" role="status" aria-label="Loading"><div class="loader-logo"><img src="images/logo-stackly.webp" alt="STACKLY PHARMA" /></div><div class="loader-bar"></div></div>

<div class="dash-mobile-header">
  <div class="dash-mobile-logo">
    <img src="images/logo-stackly.webp" alt="STACKLY PHARMA" />
  </div>
  <button class="dash-mobile-hamburger" aria-label="Toggle menu">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</div>
<div class="dashboard-layout">
  <aside class="dash-sidebar">
    <div class="dash-sidebar-logo" style="text-align: center; margin-bottom: 2rem;">
      <a href="index.html"><img src="images/logo-stackly.webp" alt="STACKLY PHARMA" style="height: 32px; width: auto;" /></a>
    </div>
    <div class="user-profile-widget">
      <div class="user-avatar-large" id="dashAvatar">U</div>
      <div class="user-name-display" id="dashName">User Name</div>
      <div class="user-role-display" id="dashRole">Member</div>
    </div>
    
    <nav class="dash-nav">
      <a href="dashboard.html" class="dash-nav-item ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Overview
      </a>
      <a href="prescriptions.html" class="dash-nav-item ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Prescriptions
      </a>
      <a href="orders.html" class="dash-nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        My Orders
      </a>
      <a href="settings.html" class="dash-nav-item ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </a>
      <button onclick="authLogout();" class="dash-nav-item" style="width:100%; text-align:left; color:var(--danger); margin-top:auto; background:none; border:none; font-size:1rem; font-family:var(--font-body); cursor:pointer;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </nav>
  </aside>

  <main class="dash-main">
        <div class="dash-header">
      <div>
        <h2 class="dash-title">My Orders</h2>
        <p style="color:var(--text-secondary);font-size:0.95rem;">Track your recent orders and order history.</p>
      </div>
    </div>
    
    <div class="recent-activity" style="margin-top:2rem;">
      <div class="activity-item">
        <div class="activity-icon" style="background:rgba(0,180,216,0.1);color:var(--secondary);"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
        <div class="activity-details" style="flex:1;">
          <h4>Order #ORD-8823</h4>
          <p>1x CardioVex Pro, 2x Omega-3 Supplements</p>
          <div class="activity-time" style="font-weight:600; color:var(--text-main); margin-top:0.4rem;">.00  Today</div>
        </div>
        <div style="flex-shrink:0; font-size:0.8rem; font-weight:700; background:rgba(0,180,216,0.1); color:var(--secondary); padding:0.3rem 0.8rem; border-radius:12px; margin-right:0.75rem; white-space:nowrap;">Shipped</div>
      </div>
      <div class="activity-item">
        <div class="activity-icon" style="background:rgba(16,185,129,0.1);color:var(--tertiary);"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <div class="activity-details" style="flex:1;">
          <h4>Order #ORD-8710</h4>
          <p>1x Cellular Nutrition Monthly Pack</p>
          <div class="activity-time" style="font-weight:600; color:var(--text-main); margin-top:0.4rem;">.00  Sep 28, 2025</div>
        </div>
        <div style="flex-shrink:0; font-size:0.8rem; font-weight:700; background:rgba(16,185,129,0.1); color:var(--tertiary); padding:0.3rem 0.8rem; border-radius:12px; margin-right:0.75rem; white-space:nowrap;">Delivered</div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container" aria-live="polite"></div>
<script src="js/auth.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="js/main.js"></script>
<script>
  if (!authIsLoggedIn()) {
    window.location.href = 'index.html';
  } else {
    const user = authGetUser();
    if (user) {
      document.getElementById('dashName').textContent = user.name || 'User';
      document.getElementById('dashRole').textContent = user.role || 'Member';
      document.getElementById('dashAvatar').textContent = (user.name || 'U')[0].toUpperCase();
    }
  }

  const dashMenuBtn = document.querySelector('.dash-mobile-hamburger');
  
  const mobileStyle = document.createElement('style');
  mobileStyle.textContent = "@media (max-width: 900px) { .dash-sidebar { position:fixed !important; top:0; left:-300px; width:260px; height:100vh; transition:left 0.3s ease; z-index:1000; display:block !important; } .dash-sidebar.mobile-open { left:0 !important; } .dash-menu-toggle { display:flex !important; } .dash-sidebar-close { display:block !important; position:absolute; top:10px; right:10px; background:none; border:none; color:var(--text-secondary); cursor:pointer; padding:5px; } }";
  document.head.appendChild(mobileStyle);

  const closeBtn = document.createElement('button');
  closeBtn.className = 'dash-sidebar-close';
  closeBtn.style.display = 'none';
  closeBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  document.querySelector('.dash-sidebar').appendChild(closeBtn);

  dashMenuBtn.addEventListener('click', () => {
    document.querySelector('.dash-sidebar').classList.add('mobile-open');
  });
  closeBtn.addEventListener('click', () => {
    document.querySelector('.dash-sidebar').classList.remove('mobile-open');
  });
</script>
</body>
</html>
