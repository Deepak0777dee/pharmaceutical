<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — STACKLY PHARMA</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: var(--bg-main); display: flex; flex-direction: column; min-height: 100vh; }
    .error-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; text-align: center; }
    
    .error-bg-shape { position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.4; }
    .error-bg-shape-1 { top: 10%; left: 10%; width: 400px; height: 400px; background: rgba(108, 99, 255, 0.3); animation: float 10s infinite ease-in-out alternate; }
    .error-bg-shape-2 { bottom: 10%; right: 10%; width: 500px; height: 500px; background: rgba(0, 180, 216, 0.3); animation: float 12s infinite ease-in-out alternate-reverse; }
    
    .error-content { max-width: 600px; z-index: 1; position: relative; }
    .error-code { font-family: var(--font-heading); font-size: 10rem; font-weight: 900; line-height: 1; margin-bottom: 1rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 10px 20px rgba(108,99,255,0.2)); }
    .error-title { font-family: var(--font-heading); font-size: 2.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 1rem; }
    .error-desc { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 2.5rem; line-height: 1.6; }
    
    .floating-pill { position: absolute; background: linear-gradient(135deg, #fff, var(--bg-alt)); border-radius: 50px; box-shadow: var(--clay-shadow-lg); border: 2px solid #fff; z-index: 0; }
    .pill-1 { width: 80px; height: 35px; top: 20%; right: 20%; animation: float 6s infinite ease-in-out; transform: rotate(15deg); }
    .pill-1::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50px 0 0 50px; }
    .pill-2 { width: 60px; height: 60px; border-radius: 50%; top: 60%; left: 15%; animation: float 8s infinite ease-in-out 1s; background: linear-gradient(135deg, #fff, var(--bg-alt)); }
    .pill-2::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--tertiary), rgba(16,185,129,0.5)); opacity: 0.2; }
    
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-20px) rotate(5deg); }
    }
  </style>
</head>
<body>

<div id="page-loader" role="status" aria-label="Loading"><div class="loader-logo"><img src="images/logo-stackly.webp" alt="STACKLY PHARMA" /></div><div class="loader-bar"></div></div>

<nav class="navbar"><div class="nav-inner">
  <a href="index.html" class="nav-logo"><img src="images/logo-stackly.webp" alt="STACKLY PHARMA" /></a>
  <ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="about.html">About</a></li><li><a href="services.html">Services</a></li><li><a href="products.html">Products</a></li><li><a href="contact.html">Contact</a></li></ul>
  <div class="nav-login-btn-wrap"><a href="login.html" class="nav-login-btn">Login</a></div>
  <button class="nav-hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
</div></nav>
<div class="mobile-menu"><a href="index.html">Home</a><a href="about.html">About</a><a href="services.html">Services</a><a href="products.html">Products</a><a href="contact.html">Contact</a><div class="mobile-login-wrap"><a href="login.html" style="display:flex;align-items:center;justify-content:center;padding:0.8rem;border-radius:999px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-weight:700;font-size:0.9rem;">Login</a></div></div>

<div class="error-wrapper">
  <div class="error-bg-shape error-bg-shape-1"></div>
  <div class="error-bg-shape error-bg-shape-2"></div>
  
  <div class="floating-pill pill-1"></div>
  <div class="floating-pill pill-2"></div>
  
  <div class="error-content" data-anim="scale-in">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back to the right path.</p>
    <a href="index.html" class="btn btn-primary btn-lg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:0.5rem;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
