<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — STACKLY PHARMA</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: var(--bg-main); display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
    .auth-bg-shape { position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.5; }
    .auth-bg-shape-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: rgba(108, 99, 255, 0.2); }
    .auth-bg-shape-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: rgba(16, 185, 129, 0.2); }
    .auth-card { width: 100%; max-width: 550px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 24px; padding: 3rem 2.5rem; box-shadow: var(--clay-shadow-lg); text-align: center; }
    .auth-logo { margin-bottom: 2rem; display: inline-block; }
    .auth-logo img { height: 40px; width: auto; }
    .auth-title { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem; }
    .auth-subtitle { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 2.5rem; }
    .auth-form { text-align: left; }
    .role-options { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .role-option { position: relative; }
    .role-option input { position: absolute; opacity: 0; cursor: pointer; }
    .role-label { display: flex; flex-direction: column; align-items: center; padding: 1rem; background: rgba(255,255,255,0.5); border: 2px solid transparent; border-radius: 16px; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--clay-shadow); }
    .role-label svg { margin-bottom: 0.5rem; color: var(--text-secondary); transition: all 0.3s ease; }
    .role-label span { font-weight: 600; font-size: 0.9rem; color: var(--text-secondary); transition: all 0.3s ease; }
    .role-option input:checked + .role-label { border-color: var(--primary); background: rgba(108, 99, 255, 0.05); }
    .role-option input:checked + .role-label svg, .role-option input:checked + .role-label span { color: var(--primary); }
  </style>
</head>
<body>

<div id="page-loader" role="status" aria-label="Loading"><div class="loader-logo"><img src="images/logo-stackly.webp" alt="STACKLY PHARMA" /></div><div class="loader-bar"></div></div>

<div class="auth-wrapper">
  <div class="auth-bg-shape auth-bg-shape-1"></div>
  <div class="auth-bg-shape auth-bg-shape-2"></div>
  
  <div class="auth-card" data-anim="scale-in">
    <a href="index.html" class="auth-logo"><img src="images/logo-stackly.webp" alt="STACKLY PHARMA" /></a>
    <h1 class="auth-title">Create an Account</h1>
    <p class="auth-subtitle">Join STACKLY PHARMA's digital healthcare platform.</p>
    
    <form class="auth-form" id="signupForm">
      
      <label class="form-label">I am a...</label>
      <div class="role-options">
        <div class="role-option">
          <input type="radio" name="role" id="role-doctor" value="Healthcare Professional" checked>
          <label class="role-label" for="role-doctor">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <span>Doctor/HCP</span>
          </label>
        </div>
        <div class="role-option">
          <input type="radio" name="role" id="role-patient" value="Patient">
          <label class="role-label" for="role-patient">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Patient</span>
          </label>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label class="form-label" for="fname">First Name</label>
          <input type="text" id="fname" class="form-input" placeholder="John" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="lname">Last Name</label>
          <input type="text" id="lname" class="form-input" placeholder="Doe" required>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-with-icon">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" class="form-input" placeholder="john.doe@example.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-with-icon">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" required minlength="8">
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div style="margin-top:1rem;margin-bottom:1.5rem;font-size:0.85rem;color:var(--text-secondary);display:flex;gap:0.5rem;align-items:flex-start;">
        <input type="checkbox" id="terms" required style="margin-top:0.2rem;accent-color:var(--primary);">
        <label for="terms">I agree to the <a href="404.html" style="color:var(--primary);text-decoration:none;">Terms of Service</a> and <a href="404.html" style="color:var(--primary);text-decoration:none;">Privacy Policy</a>.</label>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Create Account</button>
    </form>
    
    <p style="margin-top:2rem;font-size:0.9rem;color:var(--text-secondary);">
      Already have an account? <a href="login.html" style="color:var(--primary);font-weight:700;text-decoration:none;">Log in</a>
    </p>
  </div>
</div>

<div id="toast-container" aria-live="polite"></div>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  if (authIsLoggedIn()) window.location.href = 'dashboard.html';

  document.getElementById('togglePassword').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const type = pwd.getAttribute('type') === 'password' ? 'text' : 'password';
    pwd.setAttribute('type', type);
    this.style.color = type === 'text' ? 'var(--primary)' : 'var(--text-secondary)';
  });

  document.getElementById('signupForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role = document.querySelector('input[name="role"]:checked').value;
    
    if (fname && lname && email && password && document.getElementById('terms').checked) {
      const fullName = `${fname} ${lname}`;
      authSignup(fullName, email, role, password);
      // Automatically log them in after signup
      authLogin(fullName, email, role, password);
      window.showToast('Account created successfully! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    }
  });
</script>
</body>
</html>
